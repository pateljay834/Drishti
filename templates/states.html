{% extends "base.html" %}
{% block title %}DRISHTI — States & UTs{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-inner">
    <div>
      <h1 class="page-title">States & Union Territories</h1>
      <p class="page-subtitle">28 States · 8 UTs · Drill down to state-level intelligence</p>
    </div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar" style="flex-wrap:wrap;gap:0.75rem">
  <div class="toolbar-left" style="flex-wrap:wrap;gap:0.5rem">
    <input type="text" id="stateSearch" class="search-input" placeholder="Search state or UT..." oninput="applyFilters()">
    <div class="btn-group">
      <button class="btn-period active" onclick="setRegion('',this)">All</button>
      <button class="btn-period" onclick="setRegion('north',this)">North</button>
      <button class="btn-period" onclick="setRegion('south',this)">South</button>
      <button class="btn-period" onclick="setRegion('east',this)">East</button>
      <button class="btn-period" onclick="setRegion('west',this)">West</button>
      <button class="btn-period" onclick="setRegion('central',this)">Central</button>
      <button class="btn-period" onclick="setRegion('northeast',this)">Northeast</button>
    </div>
    <div class="btn-group">
      <button class="btn-period active" id="typeAll" onclick="setType('',this)">All</button>
      <button class="btn-period" onclick="setType('State',this)">States</button>
      <button class="btn-period" onclick="setType('UT',this)">UTs</button>
    </div>
  </div>
  <div class="toolbar-right">
    <span class="text-muted" id="stateCount">Loading...</span>
  </div>
</div>

<!-- Sort + View Toggle -->
<div class="toolbar" style="margin-top:0.5rem">
  <div class="toolbar-left">
    <span class="toolbar-label">Sort by:</span>
    <div class="btn-group">
      <button class="btn-period active" onclick="sortStates('name',this)">Name</button>
      <button class="btn-period" onclick="sortStates('gdp',this)">GDP</button>
      <button class="btn-period" onclick="sortStates('population',this)">Population</button>
    </div>
  </div>
</div>

<!-- States Grid -->
<div class="states-full-grid" id="statesGrid">
  <div class="skeleton-block" style="height:200px"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allStates = [], currentRegion = "", currentType = "", currentSort = "name";

async function loadStates() {
  const res = await fetch("/api/states");
  const json = await res.json();
  if (json.status !== "ok") return;
  allStates = json.data;
  renderStates();
}

function applyFilters() {
  renderStates();
}

function setRegion(r, btn) {
  currentRegion = r;
  document.querySelectorAll(".btn-period").forEach(b => {
    if (["All","North","South","East","West","Central","Northeast"].includes(b.textContent))
      b.classList.remove("active");
  });
  btn.classList.add("active");
  renderStates();
}

function setType(t, btn) {
  currentType = t;
  document.querySelectorAll(".btn-period").forEach(b => {
    if (["All","States","UTs"].includes(b.textContent)) b.classList.remove("active");
  });
  btn.classList.add("active");
  renderStates();
}

function sortStates(by, btn) {
  currentSort = by;
  document.querySelectorAll(".btn-period").forEach(b => {
    if (["Name","GDP","Population"].includes(b.textContent)) b.classList.remove("active");
  });
  btn.classList.add("active");
  renderStates();
}

function renderStates() {
  const query = document.getElementById("stateSearch").value.toLowerCase();
  let filtered = allStates.filter(s => {
    const matchName = s.name.toLowerCase().includes(query) || s.capital.toLowerCase().includes(query) || s.code.toLowerCase().includes(query);
    const matchRegion = !currentRegion || s.region === currentRegion;
    const matchType = !currentType || s.type === currentType;
    return matchName && matchRegion && matchType;
  });

  if (currentSort === "gdp") filtered.sort((a,b) => (b.gdp_usd_billion||0) - (a.gdp_usd_billion||0));
  else if (currentSort === "population") filtered.sort((a,b) => (b.population||0) - (a.population||0));
  else filtered.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById("stateCount").textContent = `${filtered.length} results`;
  const REGION_LABEL = {north:"Northern",south:"Southern",east:"Eastern",west:"Western",central:"Central",northeast:"Northeast"};

  const grid = document.getElementById("statesGrid");
  if (!filtered.length) {
    grid.innerHTML = '<p class="empty-msg">No states match your search.</p>';
    return;
  }
  grid.innerHTML = filtered.map(s => `
    <a href="/state/${s.id}" class="state-full-card">
      <div class="sfc-top" style="border-top:4px solid ${s.color||'#FF6B35'}">
        <div class="sfc-header">
          <div class="sfc-code">${s.code}</div>
          <span class="sfc-type ${s.type==='UT'?'badge-ut':'badge-state'}">${s.type}</span>
        </div>
        <div class="sfc-name">${s.name}</div>
        <div class="sfc-cap">🏛 ${s.capital}</div>
      </div>
      <div class="sfc-stats">
        <div class="sfc-stat">
          <span class="sfc-stat-val">$${(s.gdp_usd_billion||0).toFixed(1)}B</span>
          <span class="sfc-stat-label">GDP</span>
        </div>
        <div class="sfc-stat">
          <span class="sfc-stat-val">${(s.population/1e6).toFixed(1)}M</span>
          <span class="sfc-stat-label">Population</span>
        </div>
        <div class="sfc-stat">
          <span class="sfc-stat-val">${s.gdp_growth_pct||"–"}%</span>
          <span class="sfc-stat-label">Growth</span>
        </div>
      </div>
      <div class="sfc-industries">
        ${(s.major_industries||[]).slice(0,3).map(i=>`<span class="sfc-tag">${i}</span>`).join("")}
      </div>
      <div class="sfc-region">${REGION_LABEL[s.region]||s.region}</div>
    </a>
  `).join("");
}

loadStates();
</script>
{% endblock %}
